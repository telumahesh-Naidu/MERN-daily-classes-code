<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let body = document.querySelector("body")

        let table = document.createElement("table");
        let thead = document.createElement('thead');
        let tr1 = document.createElement("tr");
        let tbody = document.createElement("tbody")
        tr1.innerHTML = `<th>Name</th>
                       <th>RollNo</th>
                       <th>CNN</th>
                       <th>CPP</th>
                       <th>ADE</th>
                       <th>DSA</th>
                       <th>Total Marks</th>
                       <th>Percentage</th>
                       <th>Actions</th>
                       `

        thead.appendChild(tr1)
        table.appendChild(thead)
        body.appendChild(table)
        table.appendChild(tbody)
        table.border = 1
        table.cellSpacing = 0
        table.cellPadding = 10

        //student Dumi data
        let studentDetails = [
    { name: 'Ramesh', rollNo: 'HU2025', marks: { CNN: 90, CPP: 98, ADE: 90, DSA: 69 } },
    { name: 'karthik', rollNo: 'HU2026', marks: { CNN: 60, CPP: 88, ADE: 88, DSA: 65 } },
    { name: 'Suresh', rollNo: 'HU2027', marks: { CNN: 75, CPP: 70, ADE: 68, DSA: 72 } },
    { name: 'Madan', rollNo: 'HU2028', marks: { CNN: 85, CPP: 92, ADE: 89, DSA: 90 } },
    { name: 'Ramu', rollNo: 'HU2029', marks: { CNN: 55, CPP: 60, ADE: 58, DSA: 62 } },
    { name: 'Priya', rollNo: 'HU2030', marks: { CNN: 95, CPP: 96, ADE: 94, DSA: 93 } },
    { name: 'Arjun', rollNo: 'HU2031', marks: { CNN: 45, CPP: 50, ADE: 48, DSA: 52 } },
    { name: 'Divya', rollNo: 'HU2032', marks: { CNN: 70, CPP: 75, ADE: 72, DSA: 78 } },
    { name: 'Rahul', rollNo: 'HU2033', marks: { CNN: 82, CPP: 80, ADE: 85, DSA: 79 } },
    { name: 'Sneha', rollNo: 'HU2034', marks: { CNN: 65, CPP: 68, ADE: 70, DSA: 66 } },
    { name: 'Vikram', rollNo: 'HU2035', marks: { CNN: 50, CPP: 55, ADE: 53, DSA: 58 } },
    { name: 'Meena', rollNo: 'HU2036', marks: { CNN: 88, CPP: 90, ADE: 92, DSA: 87 } },
    { name: 'Ajay', rollNo: 'HU2037', marks: { CNN: 35, CPP: 40, ADE: 38, DSA: 42 } },
    { name: 'Lakshmi', rollNo: 'HU2038', marks: { CNN: 78, CPP: 82, ADE: 80, DSA: 76 } },
    { name: 'Naveen', rollNo: 'HU2039', marks: { CNN: 92, CPP: 89, ADE: 91, DSA: 94 } },
    { name: 'Pooja', rollNo: 'HU2040', marks: { CNN: 58, CPP: 62, ADE: 60, DSA: 59 } },
    { name: 'Teja', rollNo: 'HU2041', marks: { CNN: 67, CPP: 64, ADE: 69, DSA: 66 } },
    { name: 'Keerthi', rollNo: 'HU2042', marks: { CNN: 80, CPP: 85, ADE: 83, DSA: 81 } },
    { name: 'Manoj', rollNo: 'HU2043', marks: { CNN: 48, CPP: 52, ADE: 50, DSA: 47 } },
    { name: 'Swathi', rollNo: 'HU2044', marks: { CNN: 91, CPP: 93, ADE: 95, DSA: 92 } }
];

        //forEach used to iterate all studentDetails in Array
        studentDetails.forEach((student) => {
            let trow = document.createElement('tr');
            //calculating percentage 
            let percentage = (student.marks.ADE + student.marks.CPP + student.marks.DSA + student.marks.CNN) / 400 * 100;
            let bgColor = null;

            //condition to change gbColor based on percentage
            if (percentage >= 85 && percentage <= 100) {
                bgColor = "#00ff00";
            } else if (percentage >= 65 && percentage <= 84) {
                bgColor = "yellow"
            } else if (percentage >= 55 && percentage <= 64) {
                bgColor = "orange"
            } else {
                bgColor = "red"
            }

            trow.style.backgroundColor = bgColor;
            trow.innerHTML = `
                            <td>${student.name} </td>
                            <td>${student.rollNo} </td>
                            <td>${student.marks.CNN} </td>
                            <td>${student.marks.CPP} </td>
                            <td>${student.marks.ADE} </td>
                            <td>${student.marks.DSA} </td>
                            <td>${student.marks.ADE + student.marks.CPP + student.marks.DSA + student.marks.CNN} </td>
                            <td>${percentage} %</td>
                            <td>
                                 <button>Edit</button>
                                 <button>Delete</button>
                            </td>
                            `
            tbody.appendChild(trow)

        })


    </script>
</body>

</html>
