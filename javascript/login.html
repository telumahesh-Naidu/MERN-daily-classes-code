<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            justify-content: center;
            display: flex;
        }
        fieldset{
            background-color: antiquewhite;
            width: 600px;
            height: 400px;
            justify-content: center;
        }
        input{
            width: 100%;
        }
        button{
            width: 50%;
        }
    </style>
</head>
<body>
    <form action="" >
        <fieldset>
            <h1>Login Form</h1>
            <label for="">User Name</label>
            <input type="text" name="" id="username" placeholder="Enter Your User Name"><br><br>
            <label for="">Password</label>
            <input type="password" name="" id="password" placeholder="Enter Your Password"><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Cancel</button>

        </fieldset>
    </form>
    <script>
        let uName=document.getElementById("username")
        let pws=document.getElementById("password")   
        let form=document.querySelector("form")
        form.addEventListener("submit",(e)=>{
            e.preventDefault()
            console.log("User Name:",uName.value);
            console.log("Password",pws.value);
            window.localStorage.setItem("User Name",uName.value)
            window.localStorage.setItem("Password", pws.value)   
            let storedName=localStorage.getItem("User Name")
            let storedPassword=localStorage.getItem("Password")
            console.log("Stored Name:-",storedName)
            console.log("stored Password",storedPassword)
            
        })

    </script>
</body>
</html>
