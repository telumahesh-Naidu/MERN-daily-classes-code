<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 100px;
            width: 100px;
            border-radius: 10px;
        }
        div{
            display: flex;
            justify-content: space-around;
            margin: 20px;
            display: flex;
            background-color: rgb(183, 49, 255);
        }
        div:nth-child(odd){
            background-color: #70eeff;
        }
        ol{
            list-style: none;
        }
        span{
            font-weight: bold;
            font-size: 19px;
        }
    </style>
</head>
<body>
    <script>

        let apiUrl="https://api.github.com/users";
        let body=document.querySelector("body")
        fetch(apiUrl).then((res)=> res.json()).then((users) => {
            users.forEach((u)=>{
                console.log(u);
                let div=document.createElement("div")
                let img=document.createElement("img")
                let orderlist=document.createElement("ol")
                let li1=document.createElement("li")
                let li2=document.createElement("li")
                let li3=document.createElement("li")
                div.appendChild(img)
                div.appendChild(orderlist)
                orderlist.appendChild(li1);
                orderlist.appendChild(li2);
                orderlist.appendChild(li3);
                body.appendChild(div)
                img.src=`${u.avatar_url}`
                li1.innerHTML=`<span>username:</span>${u.login}`
                li2.innerHTML=`<span>id:</span>${u.id}`
                li1.innerHTML=`<span>username:</span>${u.user_view_type}`
            })


            
        }).catch((err)=>{
            console.log(err);
        })
    </script>
</body>
</html>
