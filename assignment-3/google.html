<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Form Style Survey</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ede7f6;
        }
        .form-container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h2 {
            color: #5e35b1;
        }
        label {
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 15px;
            padding: 8px;
        }
        .option-group input {
            width: auto;
            margin-right: 5px;
        }
        button {
            background-color: #673ab7;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>User Feedback Survey</h2>
    <p>Please fill out this form to help us improve our services.</p>

    <form>

        <!-- Q1 -->
        <label>1. What is your name?</label>
        <input type="text" required>

        <!-- Q2 -->
        <label>2. Please provide your feedback</label>
        <textarea rows="4" required></textarea>

        <!-- Q3 -->
        <label>3. How would you rate your experience?</label>
        <div class="option-group">
            <input type="radio" name="rating"> 1 – Very Poor
            <input type="radio" name="rating"> 2 – Poor
            <input type="radio" name="rating"> 3 – Average
            <input type="radio" name="rating"> 4 – Good
            <input type="radio" name="rating"> 5 – Excellent
        </div>
        <br>

        <!-- Q4 -->
        <label>4. Which technology do you prefer the most?</label>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
            <option>Node.js</option>
        </select>

        <!-- Q5 -->
        <label>5. Would you like to subscribe to updates?</label>
        <div class="option-group">
            <input type="checkbox"> Yes, I want to receive updates
            <input type="checkbox"> No, thanks
        </div>
        <br>

        <!-- Q6 -->
        <label>6. Would you recommend us?</label>
        <div class="option-group">
            <input type="radio" name="recommend"> Yes
            <input type="radio" name="recommend"> Maybe
            <input type="radio" name="recommend"> No
        </div>

        <br><br>
        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
