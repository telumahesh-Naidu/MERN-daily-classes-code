<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration Form</title>
    <style>
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url(https://images.squarespace-cdn.com/content/v1/55f8575fe4b0b275dd96426f/1718218831873-U99KMC1VPU4J1VL3CXVI/Trillium-Lake-Mt-Hood-Sunrise.jpg);
            height: 100vh;
            width: 100vw;
        }
        fieldset{
            border: none;
            backdrop-filter: blur(20px);
            margin: 20px;
            padding: 30px;
            border-radius: 10px 50px;
            box-shadow: 10px 10px 5px;
        }
        label{
            color: rgb(239, 233, 233);
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            margin-right: 20px;
        }
        button{
            padding: 10px 30px;
            background-color: rgb(114, 243, 250);
            font-weight: bold ;
            font-style: italic;
            font-family: monospace;
            border-radius: 8px ;
        }
        h1{
            text-align: center;
            color: transparent;
            background-image: linear-gradient(rgb(0, 255, 204),goldenrod);
            background-clip: text;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <form action="" onsubmit="return checkPassword()">
        <fieldset>
            <h2>REGISTERATION FORM</h2>
            <label for="fullname">FULL NAME:</label>
            <input type="text" id="fullname" maxlength="9" minlength="5" required placeholder="enter your full name">
            <br><br>
            <label for="email">EMAIL</label>
            <input type="email" id="email" required placeholder="enter your e-mail">
            <br><br>
            <label for="password">PASSWORD</label>
            <input type="password" id="password" required placeholder="enter your password">
            <br><br>
            <label for="confirmPassword">CONFIRM PASSWORD</label>
            <input type="password" id="confirmPassword" required placeholder="confirm your password">
            <br><br>
            <label for="gender">Gender</label>
            <input type="radio" id="gender" name="gender" value="male">male
            <input type="radio" id="gender" name="gender" value="female">female
            <input type="radio" id="gender" name="gender" value="others">others
            <br><br>
            <label for="hobbies">HOBBIES</label>
            <input type="checkbox" id="hobbies" name="hobbies" value="Reading">Reading
            <input type="checkbox" id="hobbies" name="hobbies" value="Sports">Sports
            <input type="checkbox" id="hobbies" name="hobbies" value="Music">Music
            <br><br>
            <label for="dob">D.O.B</label>
            <input type="datetime-local" id="dob" required placeholder="enter your date of birth">
            <br><br>
        <button type="submit">Submit</button>
        </fieldset>
    </form>
</body>
</html>
