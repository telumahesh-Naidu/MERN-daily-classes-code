 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            display:flex;
            justify-content:center;
            align-items: center;
            height: 200vh;
            width: 100pvw;
            background-image: url("https://wallpaperaccess.com/full/1121977.jp");
            background-size: cover;
        }
        fieldset{
            border: none;
            backdrop-filter: blur(50px);
            margin: 20px;
            padding: 30px;
            border-radius: 10px 50px;
            box-shadow: 10px 10px 5px;
        }
        label{
            color: rgba(240, 21, 21, 0.544);
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            margin-right: 20px;
        }
        button{
            padding: 10px 30px;
            background-color: rgb(114, 243, 250);
            font-weight: bold ;
            font-style: italic;
            font-family: monospace;
            border-radius: 8px ;
        }
        h1{
            text-align: center;
            color: transparent;
            background-image: linear-gradient(rgb(0, 255, 204),goldenrod);
            background-clip: text;
            font-size: 50px;
        }
    </style>
 </head>
 <body>
    <form action="" method="post">
        <fieldset>
            <h1>Job Application Form</h1>
            <label for="fname"> First Name</label>
            <input type="text" id="fname" maxlength="8" minlength="3" required placeholder="Enter First Name">
            <br><br>
            <label for="lname">Last Name</label>
            <input type="text" id="lname" maxlength="8" minlength="5" placeholder="Enter Last Name">
            <br><br>
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="Enter Email">
            <br><br>
            <label for="dob">DOB</label>
            <input type="date" id="dob" required placeholder="Enter the date of bith">
            <br><br>
            <label for="dob">Gender</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">
            <br><br>
            <label for="phNo">Phone Number</label>
            <input type="tel" id="phNo" pattern="[6-9]{1}[0-9]{9}" required placeholder="+91">
            <br><br>
            <label for="state">State</label>
            <select name="" id="state"
                <option value="AP">AP</option>
                <option value="KL">KL</option>
                <option value="KA">KA</option>
                <option value="DL">DL</option>
                <option value="UP">UP</option>
                <option value="MP">MP</option>
            </select>
            <br></br>
            <label for="sddress">Address</label>
            <textarea name="" rows="8" col="30" id="address" placeholder="Enter the full address"></textarea>
            <br><br>
            <label for="skills">Skils</label>
            <input type="checkbox" id="skills" name="skills" value="nodejs" >Node js
            <input type="checkbox" id="skills" name="skills" value="expressjs" >Express js
            <input type="checkbox" id="skills" name="skills" value="reactjs" >React js
            <input type="checkbox" id="skills" name="skills" value="ci/cd" >CI/CD
            <input type="checkbox" id="skills" name="skills" value="mongodb" >MongoDB
            <input type="checkbox" id="skills" name="skills" value="css" >CSS 
            <br><br><br>
            <label for="languages">Languages</label>
            <input type="range" >English
            <input type="range" >Hindi
            <input type="range" >Telugu
            <input type="range" >Kannada
            <input type="range" >Malayalam <br><br><br>
            <label for="resume">Resume</label>
            <input type="file" name="" accept=".pdf,.doc" id="resume" ><br><br><br>
            <button type="submit">Submit</button>
        </fieldset>

    </form>
 </body>
 </html>
