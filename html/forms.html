<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="https://animesuge.cz/anime/one-piece-odmau/ep-1" method="">
        <fieldset style="background-image: linear-gradient(rgb(0, 255, 238),rgba(255, 0, 221, 0.318) ,pink) ;
        border-radius: 10px 50px;
         padding: 30px; 
         margin: 50px;">
            <legend align="center">Login form</legend>
            <label for="username">Username:</label>
            <input type="text" name="username" maxlength="7"  required id="username" placeholder="enter your name">
            <br><br>
            <label for="password">Password:</label>
            <input type="text" name="password" maxlength="9" minlength="4" required id="password" placeholder="enter your password">
            <br><br>
            <button type="submit">Login</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
</body>
</html>
