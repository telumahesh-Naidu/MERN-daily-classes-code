<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student percentage</title>
</head>
<body>
    <h1 align="center">STUDENT PERCENTAGE</h1>
    <script>

        let body = document.querySelector("body")
        let table = document.createElement("table");
        let thead = document.createElement('thead');
        let tr1 = document.createElement("tr");
        let tbody = document.createElement("tbody")
        tr1.innerHTML = `<th>Student Name</th>
                       <th>C</th>
                       <th>M1</th>
                       <th>DSA</th>
                       <th>Total Marks</th>
                       <th>Percentage</th>
                       `

        thead.appendChild(tr1)
        table.appendChild(thead)
        body.appendChild(table)
        table.appendChild(tbody)
        table.border = 1
        table.cellSpacing = 0
        table.cellPadding = 10

        let StudentDetails=[
            {name:'Mahesh',marks:{C:70,M1:30,DSA:40}},
        ]
        StudentDetails in Array
        StudentDetails.forEach((student) => {
            let trow = document.createElement('tr');
            let percentage = (student.marks.C + student.marks.M1 + student.marks.DSA) / 300 * 100;
            
              trow.innerHTML = `
                            <td>${student.name} </td>
                            <td>${student.marks.C} </td>
                            <td>${student.marks.M1} </td>
                            <td>${student.marks.DSA} </td>
                            <td>${student.marks.C + student.marks.M1 +  student.marks.DSA} </td>
                            <td>${percentage} %</td>
                            `
            tbody.appendChild(trow)

        })

        




    </script>
</body>

</html>
