<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            background-image:linear-gradient(transparent,rgb(214, 101, 207),rgb(108, 232, 162));
        }
        ol{
            padding: 20px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            list-style: none;
        }
        li{
            background-color: rgb(10, 218, 255);
        }
        /*small device designing*/
        @media screen and (max-width:450px) {
            ol{
                flex-direction: column;
            }
            li{
                margin: 10px;
                text-align: center;
            }
        }
        /*ipads*/
        @media screen and (min-width:450px) and (max-width:850px) {
            nav{
                background-image: linear-gradient(goldenrod,red);
            }
            li{
                background-color: blueviolet;
                color: black;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ol>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
            <li>Login</li>
            <li>Help</li>
        </ol>
    </nav>
</body>
</html>
